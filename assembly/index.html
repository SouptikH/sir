<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Assembly Dashboard</title>

<style>
:root{
--bg:#0d0d0d;--s1:#161616;--s2:#1e1e1e;--bdr:#2a2a2a;
--txt:#e8e8e8;--muted:#888;--accent:#B9BF1F;
--font-mono:'Courier New',monospace;
--font-sans:'Arial';
}

body{background:var(--bg);color:var(--txt);margin:0;font-family:var(--font-sans)}

header{padding:30px;border-bottom:1px solid var(--bdr)}
h1{margin:0}

main{padding:30px;max-width:1300px;margin:auto}

.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px}

.card{background:var(--s1);border:1px solid var(--bdr);padding:16px;border-radius:8px}
.card-lbl{font-size:10px;color:var(--muted)}
.card-val{font-family:var(--font-mono);font-size:22px}

select,input{
width:100%;padding:8px;margin-top:6px;
background:var(--s2);border:1px solid var(--bdr);color:white;
}

.tbl-wrap{border:1px solid var(--bdr);border-radius:8px;overflow:hidden}
table{width:100%;border-collapse:collapse}
th,td{padding:8px;border-bottom:1px solid #222;font-family:var(--font-mono)}
thead{background:var(--s2)}

.bar-track{height:8px;background:#222;border-radius:4px;margin-top:6px}
.bar-fill{height:100%;border-radius:4px}
</style>
</head>

<body>

<header>
<h1 id="title"></h1>
</header>

<main>

<div class="grid">

<div class="card">
<div class="card-lbl">Mode</div>
<select id="mode">
<option value="deletion">Deletion</option>
<option value="inclusion">Inclusion</option>
</select>
</div>

<div class="card">
<div class="card-lbl">Phase</div>
<select id="phase"></select>
</div>

<div class="card">
<div class="card-lbl">Search</div>
<input id="search">
</div>

</div>

<br>

<div id="summary" class="grid"></div>

<br>

<h3>Muslim Representation</h3>
<div class="grid">

<div class="card">
<div>Assembly %</div>
<div id="asm-val"></div>
<div class="bar-track"><div id="asm-bar" class="bar-fill" style="background:#4ade80"></div></div>
</div>

<div class="card">
<div>List %</div>
<div id="csv-val"></div>
<div class="bar-track"><div id="csv-bar" class="bar-fill" style="background:#ff6b6b"></div></div>
</div>

</div>

<br>

<h3>Part-wise</h3>
<div id="parts" class="grid"></div>

<br>

<h3>Records</h3>
<div class="tbl-wrap">
<table>
<thead>
<tr><th>Part</th><th>EPIC</th><th>Name</th><th>Gender</th></tr>
</thead>
<tbody id="tbody"></tbody>
</table>
</div>

</main>

<script>
const ac=new URLSearchParams(location.search).get('ac');

let ALL=[],MODE='deletion';

async function init(){
const meta=await fetch(`../data/${ac}/meta.json`).then(r=>r.json());
document.getElementById('title').innerText=meta.ac_no+" - "+meta.ac_name;

meta.total_phases.forEach(p=>{
const o=document.createElement('option');
o.value=p;o.innerText=p;
document.getElementById('phase').appendChild(o);
});

document.getElementById('mode').onchange=e=>{MODE=e.target.value;loadPhase();}
document.getElementById('phase').onchange=loadPhase;
document.getElementById('search').oninput=render;

loadSummary(meta);
loadPhase();
}

async function loadPhase(){
const p=document.getElementById('phase').value;
const txt=await fetch(`../data/${ac}/${MODE}/phase-${p}.csv`).then(r=>r.text());
ALL=parse(txt);
render();
renderParts();
}

function parse(t){
return t.split('\n').slice(1).map(r=>{
const c=r.split(',');
return{
part:parseInt(c[1])||0,
epic:c[4]||'N/A',
name:c[5]||'N/A',
gender:c[6]||'N/A',
religion:c[9]||''
}
});
}

function render(){
const q=document.getElementById('search').value.toLowerCase();
const data=ALL.filter(d=>d.epic.toLowerCase().includes(q)||d.name.toLowerCase().includes(q));
data.sort((a,b)=>a.part-b.part);

const tb=document.getElementById('tbody');tb.innerHTML='';
data.forEach(d=>{
tb.innerHTML+=`<tr><td>${d.part}</td><td>${d.epic}</td><td>${d.name}</td><td>${d.gender}</td></tr>`;
});
}

function renderParts(){
const map={};
ALL.forEach(d=>{if(!map[d.part])map[d.part]=0;map[d.part]++;});
const div=document.getElementById('parts');div.innerHTML='';
Object.keys(map).sort((a,b)=>a-b).forEach(p=>{
div.innerHTML+=`<div class="card"><div>Part ${p}</div><div>${map[p]}</div></div>`;
});
}

async function loadSummary(meta){
let total=0,m=0,f=0,mus=0;

for(let p of meta.total_phases){
const txt=await fetch(`../data/${ac}/deletion/phase-${p}.csv`).then(r=>r.text());
const d=parse(txt);

d.forEach(x=>{
total++;
if(x.gender==='Male')m++;
if(x.gender==='Female')f++;
if(x.religion==='Muslim')mus++;
});
}

const asm=await fetch(`../data/${ac}/muslim_population.json`).then(r=>r.json());

const csvPct=total?(mus/total)*100:0;
const asmPct=asm.muslim_percentage;

document.getElementById('summary').innerHTML=`
<div class="card"><div>Total</div><div>${total}</div></div>
<div class="card"><div>Male</div><div>${m}</div></div>
<div class="card"><div>Female</div><div>${f}</div></div>
<div class="card"><div>Muslim %</div><div>${csvPct.toFixed(2)}%</div></div>
`;

document.getElementById('asm-val').innerText=asmPct.toFixed(2)+'%';
document.getElementById('csv-val').innerText=csvPct.toFixed(2)+'%';

document.getElementById('asm-bar').style.width=asmPct+'%';
document.getElementById('csv-bar').style.width=csvPct+'%';
}

init();
</script>

</body>
</html>
